<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony Static Player</title>
    <style>
        :root {
            --player-bg: #121212;
            --sidebar-bg: #000000;
            --accent: #1DB954; /* Green */
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --toolbar-height: 100px;
            --sidebar-width: 260px;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--player-bg);
            color: var(--text-main);
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            height: calc(100vh - var(--toolbar-height));
            width: 100%;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #282828;
            z-index: 20;
        }

        .track-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .track-item {
            padding: 10px 24px;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 13px;
            transition: 0.2s;
        }

        .track-item:hover { color: #fff; background: rgba(255,255,255,0.05); }

        .track-item.active {
            color: var(--accent);
            background: rgba(255,255,255,0.1);
        }

        /* VIEWPORT SYSTEM */
        .viewport-container {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at top, #282828 0%, var(--player-bg) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* STATIC CARD (FIXED) */
        .static-page-card {
            position: absolute;
            width: 80%;
            max-width: 600px;
            aspect-ratio: 1 / 1.3;
            background: white;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }

        .page-number-display {
            color: #121212;
            font-size: 15rem;
            font-weight: 900;
        }

        /* INVISIBLE SCROLL LAYER */
        .scroll-engine {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            z-index: 5;
        }

        .ghost-page { height: 100%; width: 100%; scroll-snap-align: start; }

        /* PLAYER BAR */
        .player-bar {
            position: fixed; bottom: 0;
            width: 100%; height: var(--toolbar-height);
            background-color: #181818;
            border-top: 1px solid #282828;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 100;
        }

        .art-box {
            width: 60px; height: 60px;
            background: #282828;
            color: var(--accent);
            display: flex; justify-content: center; align-items: center;
            border-radius: 4px; font-weight: 800; font-size: 22px;
            border: 1px solid #333;
        }

        /* PLAYBACK CONTROLS */
        .playback-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .button-row {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn:hover { color: white; transform: scale(1.1); }

        .play-btn {
            background: white;
            color: black;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        .progress-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: var(--text-dim);
        }

        .progress-bg {
            flex-grow: 1; height: 4px;
            background: #4f4f4f; border-radius: 2px;
            cursor: pointer; position: relative;
        }

        .progress-fill {
            height: 100%; background: var(--accent);
            width: 0%; border-radius: 2px;
        }

        input#jumpInput {
            background: #282828; border: 1px solid #3e3e3e;
            color: white; padding: 8px 16px; border-radius: 20px;
            width: 60px; text-align: center; outline: none;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <aside class="sidebar">
        <div style="padding: 24px; font-size: 11px; font-weight: bold; color: var(--text-dim); letter-spacing: 2px;">YOUR LIBRARY</div>
        <div class="track-list" id="trackList"></div>
    </aside>

    <div class="viewport-container">
        <div class="static-page-card">
            <div class="page-number-display" id="mainDisplay">1</div>
        </div>
        <div class="scroll-engine" id="scrollEngine"></div>
    </div>
</div>

<footer class="player-bar">
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="art-box" id="artDisplay">1</div>
        <div>
            <div style="font-size: 14px; font-weight: 600;">Current Page Track</div>
            <div style="font-size: 12px; color: var(--text-dim);" id="statusLabel">Page 1</div>
        </div>
    </div>

    <div class="playback-controls">
        <div class="button-row">
            <button class="nav-btn" onclick="stepNav(-1)">⏮</button>
            <button class="play-btn">▶</button>
            <button class="nav-btn" onclick="stepNav(1)">⏭</button>
        </div>
        <div class="progress-container">
            <span id="currentVal">1</span>
            <div class="progress-bg" onclick="seek(event)">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <span>300</span>
        </div>
    </div>

    <div style="display: flex; justify-content: flex-end;">
        <input type="number" id="jumpInput" placeholder="Go" onchange="jumpTo(this.value)">
    </div>
</footer>

<script>
    const total = 300;
    const scrollEngine = document.getElementById('scrollEngine');
    const trackList = document.getElementById('trackList');
    const mainDisplay = document.getElementById('mainDisplay');
    const progressBar = document.getElementById('progressBar');
    const artDisplay = document.getElementById('artDisplay');
    const currentVal = document.getElementById('currentVal');
    const statusLabel = document.getElementById('statusLabel');

    // 1. Build Virtual Scroll and Sidebar
    for (let i = 1; i <= total; i++) {
        const item = document.createElement('div');
        item.className = 'track-item';
        item.id = `track-${i}`;
        item.innerHTML = `Page ${i}`;
        item.onclick = () => jumpTo(i);
        trackList.appendChild(item);

        const ghost = document.createElement('div');
        ghost.className = 'ghost-page';
        ghost.id = `ghost-${i}`;
        scrollEngine.appendChild(ghost);
    }

    // 2. Navigation
    function jumpTo(num) {
        num = Math.max(1, Math.min(total, num));
        const target = document.getElementById(`ghost-${num}`);
        scrollEngine.scrollTo({ top: target.offsetTop, behavior: 'smooth' });
    }

    function stepNav(dir) {
        const current = parseInt(currentVal.textContent);
        jumpTo(current + dir);
    }

    function seek(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        jumpTo(Math.ceil(percent * total));
    }

    // 3. Update Sync
    function syncUI() {
        const h = scrollEngine.clientHeight;
        const y = scrollEngine.scrollTop;
        const pageNum = Math.round(y / h) + 1;
        const safeNum = Math.max(1, Math.min(total, pageNum));

        // Update Central Display
        mainDisplay.textContent = safeNum;
        
        // Update Player Stats
        artDisplay.textContent = safeNum;
        currentVal.textContent = safeNum;
        statusLabel.textContent = `Page ${safeNum}`;
        progressBar.style.width = `${(safeNum / total) * 100}%`;

        // Sidebar Update
        const active = trackList.querySelector('.active');
        if (active) active.classList.remove('active');
        const nextActive = document.getElementById(`track-${safeNum}`);
        if (nextActive) {
            nextActive.classList.add('active');
            nextActive.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
    }

    scrollEngine.addEventListener('scroll', () => {
        window.requestAnimationFrame(syncUI);
    }, { passive: true });

    // Startup
    syncUI();
</script>

</body>
</html>
