<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background: #f5f5f5; }
        h1 { max-width: 640px; text-align: center; margin-bottom: 30px; font-size: 1.4rem; color: #333; }
        .card {
            padding: 30px 36px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 640px;
            width: 100%;
        }
        .paragraph-title {
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #007bff;
            margin-top: 28px;
            margin-bottom: 6px;
        }
        .paragraph-title:first-child { margin-top: 0; }
        .paragraph {
            margin: 0 0 4px 0;
            line-height: 1.7;
            color: #444;
            cursor: pointer;
            border-radius: 6px;
            padding: 6px 8px;
            transition: background 0.2s;
        }
        .paragraph:hover { background: #f0f4ff; }
        .paragraph.loading { opacity: 0.5; cursor: wait; }
        .paragraph.playing { background: #f0fff4; color: #1a6b34; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>

    <div class="card">
        {% for segment in segments %}
        <div class="paragraph-title">{{ segment.title }}</div>
        <p class="paragraph">{{ segment.text }}</p>
        {% endfor %}
    </div>

    <audio id="player"></audio>

    <script>
        const player = document.getElementById('player');
        let activeEl = null;

        player.addEventListener('ended', () => {
            if (activeEl) {
                activeEl.classList.remove('playing');
                activeEl = null;
            }
        });

        document.querySelectorAll('.paragraph').forEach(el => {
            el.addEventListener('click', async function () {
                if (activeEl) activeEl.classList.remove('playing');
                activeEl = this;
                this.classList.add('loading');

                try {
                    const response = await fetch('/generate-audio', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: this.innerText })
                    });

                    if (!response.ok) throw new Error('Server error');

                    const blob = await response.blob();
                    player.src = URL.createObjectURL(blob);
                    player.play();
                    this.classList.add('playing');
                } catch (err) {
                    console.error("Error:", err);
                    alert("Playback failed. Check if UNREAL_TOKEN is set and Flask is running.");
                    activeEl = null;
                } finally {
                    this.classList.remove('loading');
                }
            });
        });
    </script>
</body>
</html>
