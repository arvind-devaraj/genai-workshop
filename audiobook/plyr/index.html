<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Plyr Music Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        /* Basic page styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Player Container */
        .player-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Customizing Plyr Accent Color */
        :root {
            --plyr-color-main: #00b3ff; /* Deep Sky Blue */
        }

        .plyr--audio .plyr__controls {
            background: transparent;
            border: none;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h2>Now Playing</h2>
        
        <audio id="player" controls>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3" />
            Your browser does not support the audio element.
        </audio>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        // Initialize Plyr with specific music controls
        const player = new Plyr('#player', {
            controls: [
                'play',       // Play/pause button
                'progress',   // The progress bar and scrubber
                'current-time', // The current time of playback
                'duration',   // Full duration of the track
                'mute',       // Mute button
                'volume',     // Volume control
                'settings'    // Settings menu (speed control)
            ],
            speed: { 
                selected: 1, 
                options: [0.5, 0.75, 1, 1.25, 1.5, 2] 
            }
        });

        // Optional: Log when the track starts playing
        player.on('play', () => {
            console.log('Music started!');
        });
    </script>

</body>
</html>
