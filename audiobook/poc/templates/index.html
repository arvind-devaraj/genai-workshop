<!DOCTYPE html>
<html>
<head>
    <title>Click to Speak</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; }
        .text-card {
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            cursor: pointer;
            max-width: 400px;
            text-align: center;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .text-card:hover { border-color: #007bff; transform: scale(1.02); }
        .loading { opacity: 0.5; cursor: wait; }
        .instruction { font-size: 0.8rem; color: #007bff; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="text-card" id="speakDiv">
        <div class="instruction">CLICK PARAGRAPH TO PLAY</div>
        <p id="textToRead">
            Inference optimization is a collaborative effort involving researchers, developers, 
            and engineers to make models faster and more efficient.
        </p>
    </div>

    <audio id="player"></audio>

    <script>
        document.getElementById('speakDiv').addEventListener('click', async function() {
            const card = this;
            const text = document.getElementById('textToRead').innerText;
            const player = document.getElementById('player');

            // Visual feedback
            card.classList.add('loading');

            try {
                const response = await fetch('/generate-audio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) throw new Error('Method Not Allowed or Server Error');

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                player.src = url;
                player.play();
            } catch (err) {
                console.error("Error:", err);
                alert("Playback failed. Check if UNREAL_TOKEN is set and Flask is running.");
            } finally {
                card.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
