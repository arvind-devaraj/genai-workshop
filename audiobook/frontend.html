<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebook Reader</title>
    <style>
        /* CSS: Layout and Typography */
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; }
        
        #toc { width: 300px; background: #f4f4f4; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        #reader { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        
        .toc-item { cursor: pointer; padding: 10px; border-bottom: 1px solid #ddd; }
        .toc-item.active { background: #e0e0e0; font-weight: bold; }
        
        #content { max-width: 600px; width: 100%; margin-bottom: 20px; }
        .controls { display: flex; gap: 20px; margin-top: auto; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <nav id="toc">
        <h2>Table of Contents</h2>
        <div id="toc-list"></div>
    </nav>

    <main id="reader">
        <h2 id="chapter-title"></h2>
        <div id="content"></div>
        <div class="controls">
            <button onclick="changePage(-1)">Previous</button>
            <span id="page-indicator"></span>
            <button onclick="changePage(1)">Next</button>
        </div>
    </main>

    <script>
        // Data: The Ebook Content

        page1=`In today’s digital landscape, building applications with foundation models has become a fundamental aspect of engineering. Our focus shifts from traditional software development to leveraging large language models like Claude, enabling us to create intelligent systems that can understand and respond to complex queries. As we move forward, it's crucial to consider the technical challenges that arise when integrating these models into existing projects. We'll delve into how this process involves more than just coding; it requires a deeper understanding of architecture, optimization techniques, and security measures that need to be implemented. This journey not only transforms our workflows but also opens up new possibilities in terms of scalability, performance, and accessibility.

Building applications with foundation models isn't just about technology—it’s about the future of how we interact with digital tools. By exploring these innovations, we're paving the way for a smarter, more intelligent world where every interaction is informed by data and powered by AI.`


        const bookData = [
            { title: "Chapter 1: The Beginning", pages: [page1, "This is page 2 of Chapter 1."] },
            { title: "Chapter 2: The Journey", pages: ["Welcome to Chapter 2.", "Deep into the woods.", "Almost there."] },
            { title: "Chapter 3: The End", pages: ["The final chapter.", "The End."] }
        ];

        // State
        let currentChapter = 0;
        let currentPage = 0;

        // Render Functions
        function renderToc() {
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = '';
            bookData.forEach((chapter, index) => {
                const div = document.createElement('div');
                div.className = `toc-item ${index === currentChapter ? 'active' : ''}`;
                div.textContent = chapter.title;
                div.onclick = () => { currentChapter = index; currentPage = 0; updateReader(); };
                tocList.appendChild(div);
            });
        }

        function updateReader() {
            const chapter = bookData[currentChapter];
            document.getElementById('chapter-title').textContent = chapter.title;
            document.getElementById('content').textContent = chapter.pages[currentPage];
            document.getElementById('page-indicator').textContent = `Page ${currentPage + 1} of ${chapter.pages.length}`;
            renderToc();
        }

        // Logic
        function changePage(direction) {
            const currentChapterData = bookData[currentChapter];
            
            // Check bounds
            if (direction === 1) { // Next
                if (currentPage < currentChapterData.pages.length - 1) {
                    currentPage++;
                } else if (currentChapter < bookData.length - 1) {
                    currentChapter++;
                    currentPage = 0;
                }
            } else { // Prev
                if (currentPage > 0) {
                    currentPage--;
                } else if (currentChapter > 0) {
                    currentChapter--;
                    currentPage = bookData[currentChapter].pages.length - 1;
                }
            }
            updateReader();
        }

        // Initialize
        updateReader();
    </script>
</body>
</html>
