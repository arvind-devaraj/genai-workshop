<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text to Speech with Plyr</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { font-family: sans-serif; padding: 40px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        textarea { width: 100%; border-radius: 8px; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        button { background: #00b3ff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        
        /* Hide the player container initially */
        #player-wrapper { margin-top: 30px; display: none; }
        
        /* Optional: Custom color */
        :root { --plyr-color-main: #00b3ff; }
    </style>

    <style>
        /* Basic page styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Player Container */
        .player-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Customizing Plyr Accent Color */
        :root {
            --plyr-color-main: #00b3ff; /* Deep Sky Blue */
        }

        .plyr--audio .plyr__controls {
            background: transparent;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Text to Speech</h2>
        <textarea id="textInput" rows="4" placeholder="Enter text here..."></textarea><br>
        <button onclick="generateAudio()">Generate Audio</button>
        
        <div id="player-wrapper">
            <audio id="audioPlayer" controls></audio>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        // 4. Initialize Player once
        const player = new Plyr('#audioPlayer', {
            controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'settings'],
            settings: ['speed']
        });

        async function generateAudio() {
            const text = document.getElementById('textInput').value;
            if (!text) return alert("Please enter some text");

            const response = await fetch('/api/generate-speech', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();
            
            if (data.audioUrl) {
                // 5. Programmatically set the source using Plyr API
                player.source = {
                    type: 'audio',
                    sources: [{
                        src: data.audioUrl,
                        type: 'audio/mp3',
                    }]
                };

                // Show the container and play
                document.getElementById('player-wrapper').style.display = 'block';
                player.play();
            } else {
                alert('Error: ' + (data.error || 'Unknown error'));
            }
        }
    </script>
</body>
</html>
