<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony Audio-Sync Player</title>
    <style>
        :root {
            --player-bg: #121212;
            --sidebar-bg: #000000;
            --accent: #1DB954;
            --text-dim: #b3b3b3;
            --toolbar-height: 100px;
            --sidebar-width: 260px;
            --header-height: 30vh;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--player-bg);
            color: white;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            height: calc(100vh - var(--toolbar-height));
            width: 100%;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid #282828;
            display: flex;
            flex-direction: column;
            z-index: 30;
        }

        .track-list { flex-grow: 1; overflow-y: auto; }
        .track-item { padding: 12px 24px; cursor: pointer; color: var(--text-dim); font-size: 13px; border-left: 2px solid transparent; transition: 0.2s; }
        .track-item.active { color: var(--accent); background: rgba(255,255,255,0.1); border-left-color: var(--accent); }

        /* VIEWPORT */
        .viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        /* 30% HEADER */
        header {
            height: var(--header-height);
            background: linear-gradient(to bottom, #222, #121212);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #282828;
            box-sizing: border-box;
        }

        /* 70% STAGE */
        .stage {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .static-card {
            position: absolute;
            width: 60%;
            max-width: 380px;
            aspect-ratio: 1 / 1.3;
            background: white;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            z-index: 10;
            pointer-events: none;
        }

        .page-num { color: #121212; font-size: 10rem; font-weight: 900; }

        .scroll-engine {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            z-index: 5;
        }

        .ghost-page { height: 100%; width: 100%; scroll-snap-align: start; }

        /* FOOTER PLAYER BAR */
        .player-bar {
            position: fixed; bottom: 0;
            width: 100%; height: var(--toolbar-height);
            background-color: #181818;
            border-top: 1px solid #282828;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 100;
        }

        .progress-track { flex-grow: 1; height: 4px; background: #4f4f4f; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }
        input#jumpInput { background: #282828; border: 1px solid #3e3e3e; color: white; padding: 8px 15px; border-radius: 20px; width: 60px; text-align: center; outline: none; }
        
        #masterPlayBtn {
            transition: all 0.2s ease;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <aside class="sidebar">
        <div style="padding: 24px; font-size: 11px; font-weight: bold; color: var(--text-dim); letter-spacing: 2px;">LIBRARY</div>
        <div class="track-list" id="trackList"></div>
    </aside>

    <div class="viewport">
        <header>
            <audio id="audioPlayer" controls >
                <source src="" type="audio/mpeg">
            </audio>
            
           
        </header>
        
        <div class="stage">
            <div class="static-card">
                <div class="page-num" id="mainDisplay">1</div>
            </div>
            <div class="scroll-engine" id="scrollEngine"></div>
        </div>
    </div>
</div>

<footer class="player-bar">
    <div style="display: flex; align-items: center; gap: 15px;">
        <div style="width: 50px; height: 50px; background: #282828; color: var(--accent); display: flex; justify-content: center; align-items: center; border-radius: 4px; font-weight: 800;" id="artDisplay">1</div>
        <div style="font-size: 13px;">Symphony Sync</div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
        <div style="display: flex; gap: 30px; align-items: center;">
            <button onclick="stepNav(-1)" style="background:none; border:none; color:white; cursor:pointer; font-size:22px;">⏮</button>
            
            <button id="masterPlayBtn" onclick="toggleAudio()" style="background:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer; font-size:14px; color: black;">▶</button>
            
            <button onclick="stepNav(1)" style="background:none; border:none; color:white; cursor:pointer; font-size:22px;">⏭</button>
        </div>
        <div style="width: 100%; max-width: 500px; display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-dim);">
            <span id="currentVal">1</span>
            <div class="progress-track" onclick="seek(event)">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <span>300</span>
        </div>
    </div>

    <div style="display: flex; justify-content: flex-end;">
        <input type="number" id="jumpInput" placeholder="Jump" onchange="jumpTo(this.value)">
    </div>
</footer>

<script>
    const total = 300;
    const scrollEngine = document.getElementById('scrollEngine');
    const trackList = document.getElementById('trackList');
    const mainDisplay = document.getElementById('mainDisplay');
    const headerDisplay = document.getElementById('headerDisplay');
    const progressBar = document.getElementById('progressBar');
    const artDisplay = document.getElementById('artDisplay');
    const currentVal = document.getElementById('currentVal');
    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('masterPlayBtn');

    let globalSafeNum = 1;

    // 1. Setup
    for (let i = 1; i <= total; i++) {
        const item = document.createElement('div');
        item.className = 'track-item';
        item.id = `track-${i}`;
        item.innerHTML = `Page Track ${i}`;
        item.onclick = () => jumpTo(i);
        trackList.appendChild(item);

        const ghost = document.createElement('div');
        ghost.className = 'ghost-page';
        ghost.id = `ghost-${i}`;
        scrollEngine.appendChild(ghost);
    }

    // 2. Updated Audio Control Logic
    function toggleAudio() {
            console.log(globalSafeNum);
            generateAudio();
            // Display current page number instead of pause icon
        
    }

    // 3. Navigation
    function jumpTo(num) {
        num = Math.max(1, Math.min(total, num));
        const target = document.getElementById(`ghost-${num}`);
        scrollEngine.scrollTo({ top: target.offsetTop, behavior: 'smooth' });
    }

    function stepNav(dir) {
        jumpTo(parseInt(currentVal.textContent) + dir);
    }

    function seek(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        jumpTo(Math.ceil(percent * total));
    }

    // 4. State Sync
    function sync() {
        const h = scrollEngine.clientHeight;
        const pageNum = Math.round(scrollEngine.scrollTop / h) + 1;
        globalSafeNum = Math.max(1, Math.min(total, pageNum));

        mainDisplay.textContent = globalSafeNum;
        headerDisplay.textContent = `Now Playing: Page ${globalSafeNum}`;
        artDisplay.textContent = globalSafeNum;
        currentVal.textContent = globalSafeNum;
        progressBar.style.width = `${(globalSafeNum / total) * 100}%`;

        // Update the play button live if audio is playing
        if (!audio.paused) {
            playBtn.textContent = globalSafeNum;
        }

        const active = trackList.querySelector('.active');
        if (active) active.classList.remove('active');
        const nextActive = document.getElementById(`track-${globalSafeNum}`);
        if (nextActive) {
            nextActive.classList.add('active');
            nextActive.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
    }

    scrollEngine.addEventListener('scroll', () => {
        window.requestAnimationFrame(sync);
    }, { passive: true });

    sync();
</script>
<script>
        async function generateAudio() {
            const audioPlayer = document.getElementById('audioPlayer');
            const response = await fetch('/api/generate-speech', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: "10" })
            });

            const data = await response.json();
            
            if (data.audioUrl) {
                audioPlayer.src = data.audioUrl;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
            } else {
                alert('Error: ' + (data.error || 'Unknown error'));
            }
        }
    </script>
</body>
</html>
